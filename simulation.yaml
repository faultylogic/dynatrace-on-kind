apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulation-app
  labels:
    app: simulation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulation
  template:
    metadata:
      labels:
        app: simulation
    spec:
      containers:
      - name: simulation-app
        image: gokev/load-test-app:0.02
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: simulation-service
spec:
  selector:
    app: simulation
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simulation-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2 # Forwards everything after /simulation
spec:
  rules:
  - http:
      paths:
      - path: /simulation(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: simulation-service
            port:
              number: 80
